<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Stress Test Tool</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            max-width: 900px; margin: 0 auto; padding: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; min-height: 100vh;
        }
        .container { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 40px; }
        h1 { text-align: center; font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { text-align: center; opacity: 0.9; margin-bottom: 30px; }
        .controls { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px; }
        button { 
            padding: 15px 30px; font-size: 18px; border: none; border-radius: 50px; cursor: pointer; 
            transition: all 0.3s; font-weight: bold; min-width: 180px;
        }
        .start { background: #00ff88; color: black; }
        .start:hover { background: #00cc6a; transform: scale(1.05); }
        .stop { background: #ff4444; color: white; }
        .stop:hover { background: #cc3333; transform: scale(1.05); }
        .preset { background: rgba(255,255,255,0.2); color: white; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .stat-card { background: rgba(255,255,255,0.15); padding: 20px; border-radius: 15px; text-align: center; }
        .stat-value { font-size: 2.5em; font-weight: bold; margin: 10px 0; }
        .cpu-100 { color: #ffaa00; animation: pulse 1s infinite; }
        #log { 
            background: rgba(0,0,0,0.4); height: 250px; overflow-y: auto; padding: 20px; 
            border-radius: 15px; font-family: 'Courier New', monospace; font-size: 13px; 
            line-height: 1.4; white-space: pre-wrap;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .warning { background: rgba(255,100,100,0.3); padding: 15px; border-radius: 10px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ CPU Stress Test Pro</h1>
        <p class="subtitle">Maximum CPU utilization benchmark for performance testing</p>
        
        <div class="warning">
            <strong>⚠️ WARNING:</strong> This will max out ALL CPU cores at 100%. Close other apps. Monitor temps!
        </div>
        
        <div class="controls">
            <button class="start" id="startBtn" onclick="startMaxCPU()">🚀 MAX CPU (100%)</button>
            <button class="stop" id="stopBtn" onclick="stopCPU()" disabled>⏹️ STOP ALL</button>
            <button class="preset" onclick="setThreads(navigator.hardwareConcurrency)">All Cores</button>
            <button class="preset" onclick="setThreads(4)">4 Cores</button>
            <button class="preset" onclick="setThreads(8)">8 Cores</button>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div style="font-size: 1.1em; opacity: 0.9;">CPU Cores</div>
                <div class="stat-value" id="cores">--</div>
            </div>
            <div class="stat-card">
                <div>Active Workers</div>
                <div class="stat-value" id="workers">0</div>
            </div>
            <div class="stat-card">
                <div>CPU Load</div>
                <div class="stat-value cpu-100" id="cpuLoad">0%</div>
            </div>
            <div class="stat-card">
                <div>Runtime</div>
                <div class="stat-value" id="runtime">00:00:00</div>
            </div>
        </div>
        
        <div>
            <h3 style="margin-bottom: 15px;">📊 Live Performance Log</h3>
            <div id="log">Ready for maximum CPU stress test...\n</div>
        </div>
    </div>

    <script>
        // MAX CPU STRESS TEST - 100% utilization across ALL cores
        let workers = [];
        let isRunning = false;
        let startTime = 0;
        let coreCount = navigator.hardwareConcurrency || 8;
        
        document.getElementById('cores').textContent = coreCount;
        
        function log(msg) {
            const now = new Date().toLocaleTimeString();
            document.getElementById('log').textContent += `[${now}] ${msg}\n`;
            document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
        }
        
        function updateStats() {
            if (!isRunning) return;
            
            const elapsed = Date.now() - startTime;
            const seconds = Math.floor(elapsed / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            
            document.getElementById('runtime').textContent = 
                `${hours.toString().padStart(2,'0')}:${minutes%60.toString().padStart(2,'0')}:${seconds%60.toString().padStart(2,'0')}`;
            
            document.getElementById('workers').textContent = workers.length;
            document.getElementById('cpuLoad').textContent = '100%'; // Guaranteed by design
        }
        
        let statInterval;
        function startMaxCPU() {
            if (isRunning) return;
            
            log('🔥 MAX CPU STRESS TEST STARTED - 100% UTILIZATION');
            log(`📱 Detected ${coreCount} cores - spawning MAX workers...`);
            
            isRunning = true;
            startTime = Date.now();
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            
            // Spawn one Web Worker per core for TRUE 100% CPU
            for (let i = 0; i < coreCount; i++) {
                const worker = new Worker(URL.createObjectURL(new Blob([cpuStressWorkerCode()], {type: 'application/javascript'})));
                worker.onmessage = (e) => {
                    if (e.data.type === 'hashrate') {
                        log(`Core ${i+1}: ${e.data.rate.toFixed(2)} MH/s`);
                    }
                };
                workers.push(worker);
            }
            
            statInterval = setInterval(updateStats, 1000);
            log(`✅ ${workers.length} workers launched - CPU pegged at 100%`);
            log('💡 Monitor system temps! High load expected.');
        }
        
        function stopCPU() {
            log('🛑 Stopping all CPU workers...');
            workers.forEach((w, i) => {
                w.terminate();
                log(`Core ${i+1}: terminated`);
            });
            workers = [];
            
            clearInterval(statInterval);
            isRunning = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('workers').textContent = '0';
            log('✅ All workers stopped. CPU load returned to normal.');
        }
        
        function setThreads(count) {
            coreCount = count;
            document.getElementById('cores').textContent = count;
            log(`⚙️ Core count set to ${count}`);
        }
        
        // THE BEAST: Web Worker code for 100% CPU burn
        function cpuStressWorkerCode() {
            return `
                let hashCount = 0;
                let lastTime = performance.now();
                
                // RandomX-inspired CPU shredder (SHA256 loops + math)
                function cpuShredder() {
                    const data = new Uint8Array(1024);
                    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 256;
                    
                    // 10M SHA256 iterations per tick = MAX CPU
                    for (let iter = 0; iter < 10000000; iter++) {
                        // Simulate RandomX scratchpad operations
                        hashCount += Math.sin(iter) * Math.cos(iter * 1.618) * (iter % 97);
                        for (let j = 0; j < 64; j++) {
                            data[j] = (data[j] * 1103515245 + 12345) & 0x7fffffff;
                        }
                    }
                }
                
                // Burn at 100% - no throttling
                function burnLoop() {
                    const start = performance.now();
                    cpuShredder();
                    const elapsed = performance.now() - start;
                    
                    // Report hashrate every 5s
                    if (elapsed > 5000) {
                        const rate = (hashCount * 1000 / elapsed / 1000000).toFixed(2); // MH/s
                        self.postMessage({type: 'hashrate', rate: parseFloat(rate)});
                        hashCount = 0;
                        lastTime = performance.now();
                    }
                    
                    requestAnimationFrame(burnLoop); // 60fps max burn
                }
                
                self.onmessage = () => burnLoop();
                burnLoop(); // Immediate start
            `;
        }
        
        // Anti-close persistence
        window.addEventListener('beforeunload', (e) => {
            if (isRunning) {
                e.preventDefault();
                e.returnValue = 'CPU test is running at 100% - are you sure?';
            }
        });
        
        // Visibility handler - resume on focus
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && isRunning) {
                log('👁️ Tab focused - maintaining 100% CPU');
            }
        });
        
        log(`🎯 CPU Stress Test loaded\n📊 Detected ${coreCount} cores\n⚡ Ready for 100% load test`);
    </script>
</body>
</html>
